brain_path: "/home/ubuntu/brain"
default_workflow: spdd-feature-exec
default_model_profile: balanced

approval:
  full_requires_human_gates: true
  auto_approval_mode: automatic

validation:
  test: npm test
  typecheck: npm run typecheck
  lint: npm run lint

# Workflow execution settings
workflow:
  reviewer: claude    # "claude" | "codex"
                      # claude: Claude Code usa SKILL.md code-reviewer (default)
                      # codex:  nó review executa `codex review --base main` + salva artefato

# Linear — filled by .github/scripts/linear-init.sh at project kickoff
# Run: bash .github/scripts/linear-init.sh
linear:
  api_key_env: "LINEAR_API_KEY"            # nome da env var (não o valor)
  team_id: "9aee933c-99f8-408a-abfd-fb0ca30e0b6d"            # Team UUID (ex: abc-123-...)
  project_id: "{{linear_project_id}}"      # Project UUID (opcional — agrupa issues no Linear)
  states:
    in_progress: "5add3715-b4cf-466a-8f71-d9e062ce64c2"   # UUID do state "In Progress" (started)
    in_review:   "db22da55-1702-4ab0-8053-f91fa88624df"     # UUID do state "In Review" (started)
    done:        "953139e6-69fb-4280-a766-b240c717aacc"          # UUID do state "Done" (completed)
    blocked:     "1324feac-199f-42de-a3c6-798251fb40cf"       # UUID do state "Blocked" (started)
  labels:
    type_feature:   "a27c9c58-e691-4e55-95d9-aded30bbb57f"    # UUID do label type:feature
    review_pending: "{{linear_label_review}}"     # UUID do label review:pending

# GitHub — apenas para criação de PRs (gestão de projeto no Linear)
github:
  owner: "danielrmarques"
