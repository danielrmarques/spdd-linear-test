name: spdd-feature-full
description: |
  Complete SPDD workflow with human interaction at analysis, planning and
  solutioning gates. Uses every AiLM software-development phase, one nominal
  node per agent. Skills loaded from `brain_path` with explicit AiLM paths.
  Input: Linear issue identifier (e.g. 'ENG-123'). No GitHub issue created — PR links directly to Linear.

provider: claude
model: sonnet
interactive: true

nodes:
  - id: setup
    model: haiku
    prompt: |
      Read the Linear issue specified in $ARGUMENTS (format: "ENG-NNN").

      1. Extract the Linear issue identifier from $ARGUMENTS.
      2. Read `.spdd/config.yml` → get `linear.api_key_env`.
         Resolve API key:
         KEY_VAR=$(grep 'api_key_env:' .spdd/config.yml | awk '{print $2}' | tr -d '"')
         KEY=$(printenv "$KEY_VAR")
         If KEY is empty, abort: "LINEAR_API_KEY env var not set."
      3. Fetch issue from Linear:
         curl -s -X POST https://api.linear.app/graphql \
           -H "Authorization: $KEY" \
           -H "Content-Type: application/json" \
           -d '{"query":"query{issue(id:\"ENG-NNN\"){identifier title description url}}"}'
      4. Write `.spdd/meta.yml`:
         feature: "<title from Linear>"
         linear_issue_id: "ENG-NNN"
         linear_issue_url: "<url>"
         issue_number: ""
         item_id: "ENG-NNN"
         workflow: spdd-feature-full
         started_at: <current ISO timestamp>
      5. Write `.spdd/costs.yml`: []

      Output exactly: ISSUE=ENG-NNN

  - id: setup-board
    model: haiku
    depends_on: [setup]
    prompt: |
      Load and execute: .archon/commands/linear-setup-board.md

  # ─── 1-Analysis ──────────────────────────────────────────────────────────
  - id: researcher
    model: sonnet
    depends_on: [setup-board]
    prompt: |
      Read feature context from .spdd/meta.yml.

      Load skill: `50-skills/agents/AiLM/1-analysis/researcher/SKILL.md` (from `brain_path` in `.spdd/config.yml`).

      Conduct deep research on the feature topic. Synthesize findings, cite
      sources, surface unknowns.

      Output contract: `.spdd/analysis/FEAT-{NNN}_research.md`
        - frontmatter: type, agent: researcher, status: draft
        - sections: Context, Findings, Sources, Open Questions

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: researcher
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/analysis/FEAT-{NNN}_research.md

  - id: domain-expert
    model: sonnet
    depends_on: [researcher]
    prompt: |
      Load skill: `50-skills/agents/AiLM/1-analysis/domain-expert/SKILL.md`.

      Read `.spdd/analysis/FEAT-{NNN}_research.md`. Extract domain terminology,
      business rules and edge cases. Build glossary and domain model.

      Output contract: `.spdd/analysis/FEAT-{NNN}_domain.md`
        - frontmatter: type, agent: domain-expert, status: draft
        - sections: Glossary, Domain Model, Business Rules, Edge Cases

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: domain-expert
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/analysis/FEAT-{NNN}_domain.md

  - id: market-analyst
    model: sonnet
    depends_on: [researcher]
    prompt: |
      Load skill: `50-skills/agents/AiLM/1-analysis/market-analyst/SKILL.md`.

      Read `.spdd/analysis/FEAT-{NNN}_research.md`. Assess market, competition,
      adoption signals. If market analysis is not material to this feature,
      write a short "not applicable" note with rationale.

      Output contract: `.spdd/analysis/FEAT-{NNN}_market.md`
        - frontmatter: type, agent: market-analyst, status: draft | not-applicable
        - sections: Market Snapshot, Competition, Trends, Implications (or N/A rationale)

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: market-analyst
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/analysis/FEAT-{NNN}_market.md

  - id: analysis-synthesis
    model: sonnet
    depends_on: [domain-expert, market-analyst]
    prompt: |
      Read all `.spdd/analysis/FEAT-{NNN}_*.md` artifacts (research, domain, market).
      Synthesize into a single document using `.spdd/templates/analysis-synthesis.md`.

      Output contract: `.spdd/analysis/FEAT-{NNN}_synthesis.md`
        - frontmatter: type, status: draft
        - sections: Problem Framing, Findings, Scope, Risks, Open Questions

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: analysis-synthesis
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/analysis/FEAT-{NNN}_synthesis.md

  - id: approve-analysis
    depends_on: [analysis-synthesis]
    loop:
      prompt: |
        Present `.spdd/analysis/FEAT-{NNN}_synthesis.md` to Daniel.
        If approved:
        1. Set `status: approved` in the synthesis frontmatter.
        2. Respond exactly `APPROVED`.
        If feedback is provided, revise the synthesis and ask again.
        Feedback: $LOOP_USER_INPUT
      until: APPROVED
      interactive: true
      max_iterations: 10
      gate_message: "Revise analysis/framing. Responda aprovado ou envie ajustes."

  # ─── 2-Planning ──────────────────────────────────────────────────────────
  - id: product-manager
    model: sonnet
    depends_on: [approve-analysis]
    prompt: |
      Load skill: `50-skills/agents/AiLM/2-planning/product-manager/SKILL.md`.

      Read approved analysis synthesis. Produce PRD with user stories,
      acceptance criteria, priorities, explicit out-of-scope.

      Output contract: `.spdd/planning/FEAT-{NNN}_prd.md` (template `.spdd/templates/prd.md`)
        - frontmatter: type, agent: product-manager, status: draft
        - sections: Problem, Outcome, User Stories, Acceptance Criteria, Non-Goals

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: product-manager
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/planning/FEAT-{NNN}_prd.md

  - id: sprint-planner
    model: sonnet
    depends_on: [product-manager]
    prompt: |
      Load skill: `50-skills/agents/AiLM/2-planning/sprint-planner/SKILL.md`.

      Read PRD. Break into epics, stories, tasks. Estimate effort. Sequence.

      Output contract: `.spdd/planning/FEAT-{NNN}_sprint-plan.md` (template `.spdd/templates/sprint-plan.md`)
        - frontmatter: type, agent: sprint-planner, status: draft
        - sections: Epics, Stories, Sprint Sequence, Estimates

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: sprint-planner
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/planning/FEAT-{NNN}_sprint-plan.md

  - id: tech-writer
    model: sonnet
    depends_on: [sprint-planner]
    prompt: |
      Load skill: `50-skills/agents/AiLM/2-planning/tech-writer/SKILL.md`.

      Read PRD and sprint plan. Produce concise technical spec with diagrams
      (text/mermaid), API contracts (if applicable), data flow.

      Output contract: `.spdd/planning/FEAT-{NNN}_tech-spec.md`
        - frontmatter: type, agent: tech-writer, status: draft
        - sections: Overview, Components, Contracts, Data Flow, Open Questions

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: tech-writer
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/planning/FEAT-{NNN}_tech-spec.md

  - id: approve-planning
    depends_on: [tech-writer]
    loop:
      prompt: |
        Present PRD, sprint plan and tech spec to Daniel.
        If approved:
        1. Set each frontmatter `status: approved`.
        2. Respond exactly `APPROVED`.
        Otherwise revise from feedback.
        Feedback: $LOOP_USER_INPUT
      until: APPROVED
      interactive: true
      max_iterations: 10
      gate_message: "Revise planning. Responda aprovado ou envie ajustes."

  # ─── 3-Solutioning ───────────────────────────────────────────────────────
  - id: architect
    model: sonnet
    depends_on: [approve-planning]
    prompt: |
      Load skill: `50-skills/agents/AiLM/3-solutioning/architect/SKILL.md`.

      Inputs: approved planning artifacts + `.spdd/architecture.md`,
      `.spdd/conventions.md`, `.spdd/norms.md`, `.spdd/safeguards.md`,
      `.spdd/golden-principles.md`.

      Produce REASONS Canvas: Operations, Trade-offs, ADRs (when applicable).

      Output contract: `.spdd/canvas/FEAT-{NNN}_{slug}.md`
        - frontmatter: type, agent: architect, status: draft
        - sections: REASONS (Risks, Effects, Alternatives, Specification, Operations, Norms, Safeguards)

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: architect
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/canvas/FEAT-{NNN}_{slug}.md

  - id: ux-designer
    model: sonnet
    depends_on: [architect]
    prompt: |
      Load skill: `50-skills/agents/AiLM/3-solutioning/ux-designer/SKILL.md`.

      Read Canvas and PRD. If UX impact exists, design flows, states,
      interactions. Otherwise, write "not applicable" with rationale.

      Output contract: `.spdd/solution/FEAT-{NNN}_ux-spec.md`
        - frontmatter: type, agent: ux-designer, status: draft | not-applicable
        - sections: Flows, States, Wireframes (text), A11y notes (or N/A rationale)

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: ux-designer
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/solution/FEAT-{NNN}_ux-spec.md

  - id: strategic-advisor
    model: sonnet
    depends_on: [architect]
    prompt: |
      Load skill: `50-skills/agents/AiLM/3-solutioning/strategic-advisor/SKILL.md`.

      Read Canvas and planning. Surface material trade-offs (cost, risk,
      reversibility). If no decision-grade trade-off exists, write "no
      decision required" with rationale.

      Output contract: `.spdd/solution/FEAT-{NNN}_decision.md`
        - frontmatter: type, agent: strategic-advisor, status: draft | not-applicable
        - sections: Options, Trade-offs, Recommendation, Risks

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: strategic-advisor
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/solution/FEAT-{NNN}_decision.md

  - id: approve-solutioning
    depends_on: [ux-designer, strategic-advisor]
    loop:
      prompt: |
        Present Canvas, UX spec and decision note to Daniel.
        If approved:
        1. Update Canvas to `status: approved`, `approved_by: daniel`, `approved_at: <ISO timestamp>`.
        2. Respond exactly `APPROVED`.
        Otherwise revise artifacts from feedback.
        Feedback: $LOOP_USER_INPUT
      until: APPROVED
      interactive: true
      max_iterations: 20
      gate_message: "Revise solutioning/Canvas. Responda aprovado ou envie ajustes."

  # ─── Security gates (Solutioning shift-left) ────────────────────────────
  - id: threat-modeler
    model: sonnet
    depends_on: [approve-solutioning]
    prompt: |
      ## Security Gate — Threat Modeling (STRIDE)

      Load skill: `50-skills/agents/AiLM/3-solutioning/threat-modeler/SKILL.md`.

      Inputs:
      - `.spdd/canvas/FEAT-{NNN}_{slug}.md` (status: approved)
      - `.spdd/architecture.md` (if exists)
      - `.spdd/config.yml`

      Steps:
      1. Map attack surface: actors, trust boundaries, entry points per Operation.
      2. Apply STRIDE to each critical component.
      3. Classify each threat: Critical/High/Medium/Low.
      4. List defensive operations to suggest for the Canvas.
      5. List adversarial scenarios for the red-team to explore next.

      Output contract: `.spdd/security/FEAT-{NNN}_threat-model.md` (template `.spdd/templates/threat-model.md`)
        - frontmatter: type, agent: threat-modeler, status: draft
        - sections: Attack Surface, STRIDE Analysis, Threats Catalog (TH-NNN), Defensive Ops, Adversarial Hints

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: threat-modeler
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/security/FEAT-{NNN}_threat-model.md

  - id: red-team
    model: sonnet
    depends_on: [threat-modeler]
    prompt: |
      ## Security Gate — Red Team (adversarial on Canvas)

      Load skill: `50-skills/agents/AiLM/3-solutioning/red-team/SKILL.md`.

      Read:
      - `.spdd/canvas/FEAT-{NNN}_{slug}.md`
      - `.spdd/security/FEAT-{NNN}_threat-model.md`

      Adopt attacker perspective. For each Operation, generate adversarial
      scenarios with concrete test_cases. Reference TH-NNN where applicable.

      Output contract: `.spdd/security/FEAT-{NNN}_red-team-canvas.md` (template `.spdd/templates/red-team-canvas.md`)
        - frontmatter: type, agent: red-team, status: draft
        - sections: Adversarial Scenarios (RT-NNN), Test Cases, Mitigations Required

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: red-team
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/security/FEAT-{NNN}_red-team-canvas.md

  # ─── 4-Implementation ──────────────────────────────────────────────────
  - id: test-engineer
    model: sonnet
    depends_on: [red-team]
    prompt: |
      Load skill: `50-skills/agents/AiLM/4-implementation/test-engineer/SKILL.md`.

      Read approved Canvas, PRD, UX spec, threat model and red-team canvas.
      Incorporate RT-NNN adversarial test cases into the plan.

      Output contract: `.spdd/tests/FEAT-{NNN}_test-plan.md`
        - frontmatter: type, agent: test-engineer, status: draft
        - sections: Test Strategy, Cases (per Operation), Edge Cases, Adversarial Cases (RT-NNN), Validation Commands

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: test-engineer
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/tests/FEAT-{NNN}_test-plan.md

  - id: implementer
    model: sonnet
    depends_on: [test-engineer]
    loop:
      prompt: |
        Load skill: `50-skills/agents/AiLM/4-implementation/implementer/SKILL.md`.

        Inputs: approved Canvas + full test plan.
        Execute one unfinished Operation using Red-Green-Refactor.
        Commit atomically and mark the Operation done.

        Append to `.spdd/costs.yml`:
        - node: implementer
          model: sonnet
          completed_at: <current ISO timestamp>
          artifacts: []

        If all Operations are done, respond exactly `ALL_TASKS_COMPLETE`.
      until: ALL_TASKS_COMPLETE
      fresh_context: true
      max_iterations: 40

  - id: validation
    model: sonnet
    depends_on: [implementer]
    prompt: |
      Run npm test, npm run typecheck, and npm run lint if present.
      Fix failures. If all pass, respond `VALIDATION_PASSED`.

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: validation
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts: []

  - id: security-reviewer
    model: sonnet
    depends_on: [validation]
    prompt: |
      ## Security Gate — Security Review (OWASP Top 10)

      Load skill: `50-skills/agents/AiLM/4-implementation/security-reviewer/SKILL.md`.

      Inputs:
      - git diff main...HEAD (run: git diff main...HEAD -- src/ tests/ app/ lib/ 2>/dev/null || git diff HEAD~1...HEAD)
      - `.spdd/canvas/FEAT-{NNN}_{slug}.md`
      - `.spdd/security/FEAT-{NNN}_threat-model.md` (if exists)
      - `.spdd/security/FEAT-{NNN}_red-team-canvas.md` (if exists)
      - `.spdd/conventions.md`, `.spdd/safeguards.md`

      Steps:
      1. Blind Hunt: read diff without security context — flag raw issues.
      2. OWASP Top 10: evaluate each category against the diff. Mark N/A with reason.
      3. Validate threat-model coverage: for each TH-NNN, was the mitigation implemented?
      4. Validate red-team coverage: for each RT-NNN Critical/High, does the code resist?
      5. Classify all findings: Critical/High/Medium/Low/Info.
      6. Verdict: approved | changes_required | blocked.

      Output contract: `.spdd/security/FEAT-{NNN}_security-review.md` (template `.spdd/templates/security-review.md`)
        - frontmatter: type, agent: security-reviewer, verdict, status: draft
      If verdict is blocked or changes_required, stop and report. Emit a compact Slack-ready brief
      tagged as `security review` with verdict, findings, remediation plan, and the next step. The Slack adapter will surface
      this in the thread and Daniel must approve with `@archon approve run=<run_id> aprovado`
      before implementation continues. Implementation must fix Critical/High before proceeding to
      code-reviewer.
        - sections: Blind Hunt, OWASP, TH-Coverage, RT-Coverage, Findings (classified), Verdict

      If verdict is `blocked` or `changes_required`, stop and report findings.
      Implementation must fix Critical/High before proceeding to code-reviewer.

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: security-reviewer
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/security/FEAT-{NNN}_security-review.md

  - id: code-reviewer
    model: sonnet
    depends_on: [security-reviewer]
    prompt: |
      ## Code Review

      Read `.spdd/config.yml` → check `workflow.reviewer` (default: `claude` if absent).

      ### If reviewer = claude (or field missing):
      Load skill: `50-skills/agents/AiLM/4-implementation/code-reviewer/SKILL.md`.
      Review against all SPDD artifacts. Apply P0/P1 fixes and save report.

      ### If reviewer = codex:
      1. Read `.spdd/meta.yml` → extract `issue_number` as NNN (zero-padded to 3 digits).
      2. Run: mkdir -p .spdd/reviews
      3. Run:
         codex review --base main > .spdd/reviews/FEAT-<NNN>_review.md
      4. Verify file is non-empty; if not, write fallback: "# Codex Review\nreviewer: codex\nverdict: error\nCodex returned no output."
      Note: `devops` node runs separately regardless of reviewer setting.

      Output contract: `.spdd/reviews/FEAT-{NNN}_review.md`
        - frontmatter: type, agent: code-reviewer | codex, verdict, status: draft

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: code-reviewer
        model: <sonnet if reviewer=claude | codex if reviewer=codex>
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/reviews/FEAT-{NNN}_review.md

  - id: devops
    model: sonnet
    depends_on: [code-reviewer]
    prompt: |
      Load skill: `50-skills/agents/AiLM/4-implementation/devops/SKILL.md`.

      Check whether CI/CD, deploy, infra or monitoring changes are required.
      Apply required non-secret config changes or write "not applicable" with
      rationale.

      Output contract: `.spdd/reviews/FEAT-{NNN}_devops.md`
        - frontmatter: type, agent: devops, status: draft | not-applicable
        - sections: CI/CD Changes, Deploy Impact, Monitoring/Observability (or N/A rationale)

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: devops
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts:
          - .spdd/reviews/FEAT-{NNN}_devops.md

  - id: create-pr
    model: sonnet
    depends_on: [devops]
    prompt: |
      ## Cost Estimate
      1. Read `.spdd/costs.yml` (list of {node, model, artifacts}).
      2. For each entry, read each artifact file and count total characters. Divide by 4 to estimate tokens.
         Nodes with empty artifacts list use 200 tokens as a baseline estimate.
      3. Apply output token pricing: haiku=$1.25/M, sonnet=$15/M, opus=$75/M.
         For entries with model=codex, mark cost as "$0.00 (OpenAI — billed separately)".
      4. Build a markdown table:
         | Node | Model | Est. Tokens | Est. Cost |
         |------|-------|-------------|-----------|
         | **Total** | | ~NNN | ~$0.00 |
      Save table as COST_TABLE variable.

      ## Create PR
      1. Read `.spdd/meta.yml` → get linear_issue_id (e.g. ENG-123) and feature title.
      2. Extract NNN from linear_issue_id.
      3. Push branch: git push -u origin HEAD
      4. Create PR:
         gh pr create \
           --title "feat(FEAT-{NNN}): {slug}" \
           --body "Closes {linear_issue_id}

         ## Analysis
         See `.spdd/analysis/FEAT-{NNN}_*.md`

         ## Planning
         See `.spdd/planning/FEAT-{NNN}_prd.md`

         ## Canvas
         See `.spdd/canvas/FEAT-{NNN}_{slug}.md`

         ## Test plan
         See `.spdd/tests/FEAT-{NNN}_test-plan.md`

         ## Security
         See `.spdd/security/FEAT-{NNN}_security-review.md`

         ## Review
         See `.spdd/reviews/FEAT-{NNN}_review.md`

         ## Cost Estimate
         {COST_TABLE}"
      5. Apply labels: type:feature, review:pending
      6. Post cost table as comment on Linear issue:
         COMMENT_BODY="## Cost Estimate (spdd-feature-full)\n\n{COST_TABLE}"
         Load and execute: .archon/commands/linear-post-comment.md
      7. Update Linear issue state → In Review:
         Load and execute: .archon/commands/linear-mark-in-review.md
      8. Report PR URL.

      ## Cost tracking
      Append to `.spdd/costs.yml`:
      - node: create-pr
        model: sonnet
        completed_at: <current ISO timestamp>
        artifacts: []
